  \ 'NYT Magazine', 'It\\'s Nice That'],\n    displayFont: \"'Iowan Old Style', 'Charter',\
  \ Georgia, serif\",\n    bodyFont:\n      \"-apple-system, BlinkMacSystemFont, 'Segoe\
