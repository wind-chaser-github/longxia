  \ No gradients.',\n      'underline links, no hover decoration — let the typography\
  \ carry it',\n    ],\n  },\n];\n\n/**\n * Render the direction-picker form body\
  \ for emission as a `<question-form>`.\n * Uses the `direction-cards` question type\
  \ so the UI renders each option\n * as a rich card (palette swatches + type sample\
  \ + mood blurb + refs)\n * instead of a plain radio. Falls back gracefully — older\
  \ clients that\n * don't recognise `direction-cards` treat it as text.\n */\nexport\
  \ function renderDirectionFormBody(): string {\n  const cards = DESIGN_DIRECTIONS.map((d)\
  \ => ({\n    id: d.id,\n    label: d.label,\n    mood: d.mood,\n    references:\
  \ d.references,\n    palette: [\n      d.palette.bg,\n      d.palette.surface,\n\
  \      d.palette.border,\n      d.palette.muted,\n      d.palette.fg,\n      d.palette.accent,\n\
  \    ],\n    displayFont: d.displayFont,\n    bodyFont: d.bodyFont,\n  }));\n\n\
  \  const form = {\n    description:\n      'No brand to match — pick a visual direction.\
  \ Each one ships with a real palette, font stack, and layout posture. You can override\
  \ the accent below.',\n    questions: [\n      {\n        id: 'direction',\n   \
  \     label: 'Direction',\n        type: 'direction-cards',\n        required: true,\n\
  \        options: DESIGN_DIRECTIONS.map((d) => d.id),\n        cards,\n      },\n\
  \      {\n        id: 'accent_override',\n        label: 'Accent override (optional)',\n\
  \        type: 'text',\n        placeholder:\n          'e.g. \"use moss green instead\
  \ of cobalt\", \"no orange — too brand-y for us\"',\n      },\n    ],\n  };\n\n\
  \  return JSON.stringify(form, null, 2);\n}\n\n/**\n * The block we splice into\
  \ the system prompt so the agent has each\n * direction's full spec inline (palette,\
  \ fonts, posture). Used by the\n * discovery prompt to teach the agent *how* to\
  \ bind a chosen direction\n * onto the seed template's `:root` variables.\n */\n\
  export function renderDirectionSpecBlock(): string {\n  const lines: string[] =\
  \ [\n    '## Direction library — bind into `:root` when the user picks one',\n \
  \   '',\n    'Each direction below carries a CSS-ready palette (OKLch values) and\
  \ font stacks. When the user selects one in the direction-form, replace the seed\
  \ template\\'s `:root` block with that direction\\'s palette and font stacks **verbatim**\
  \ — do not improvise. Posture cues describe how that direction *behaves* (border\
  \ weight, radius, accent budget); honour them in the layout choices.',\n    '',\n\
  \  ];\n  for (const d of DESIGN_DIRECTIONS) {\n    lines.push(`### ${d.label}  \\\
  `(id: ${d.id})\\``);\n    lines.push('');\n    lines.push(`**Mood:** ${d.mood}`);\n\
  \    lines.push('');\n    lines.push(`**References:** ${d.references.join(', ')}.`);\n\
  \    lines.push('');\n    lines.push('**Palette (drop into `:root`):**');\n    lines.push('');\n\
  \    lines.push('```css');\n    lines.push(`:root {`);\n    lines.push(`  --bg:\
  \      ${d.palette.bg};`);\n    lines.push(`  --surface: ${d.palette.surface};`);\n\
  \    lines.push(`  --fg:      ${d.palette.fg};`);\n    lines.push(`  --muted:  \
  \ ${d.palette.muted};`);\n    lines.push(`  --border:  ${d.palette.border};`);\n\
  \    lines.push(`  --accent:  ${d.palette.accent};`);\n    lines.push('');\n   \
  \ lines.push(`  --font-display: ${d.displayFont};`);\n    lines.push(`  --font-body:\
  \    ${d.bodyFont};`);\n    if (d.monoFont) lines.push(`  --font-mono:    ${d.monoFont};`);\n\
  \    lines.push(`}`);\n    lines.push('```');\n    lines.push('');\n    lines.push('**Posture:**');\n\
  \    for (const p of d.posture) lines.push(`- ${p}`);\n    lines.push('');\n  }\n\
  \  return lines.join('\\n');\n}\n\n/** Look up a direction by its `label` (what\
  \ the user sees in the form). */\nexport function findDirectionByLabel(label: string):\
  \ DesignDirection | undefined {\n  const trimmed = label.trim();\n  return DESIGN_DIRECTIONS.find((d)\
  \ => d.label === trimmed || d.id === trimmed);\n}\n\n\n【OpenDesign 31 种全域 Skills\
