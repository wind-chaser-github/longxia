  step_media_architect:
    node_id: step_media_architect
    agent_id: lobster_uiux
    hitl_enabled: false
    transitions:
      - condition: "always"
        next_node: step_media_coder
        
  step_media_coder:
    node_id: step_media_coder
    agent_id: lobster_coder
    hitl_enabled: false
    transitions:
      - condition: "always"
        next_node: step_media_verify

  step_media_verify:
    node_id: step_media_verify
    agent_id: lobster_verifier
