workflow_id: crisis_pr
entry_node: step_governor_init
nodes:
  step_governor_init:
    node_id: step_governor_init
    agent_id: lobster_governor
    hitl_enabled: false
    transitions:
      - condition: "always"
        next_node: step_pr_draft
        
  step_pr_draft:
    node_id: step_pr_draft
    agent_id: lobster_pr
    hitl_enabled: false
    transitions:
      - condition: "always"
        next_node: step_final_verify

  step_final_verify:
    node_id: step_final_verify
    agent_id: lobster_verifier
    hitl_enabled: true  # 【警告】在此节点触发阻断，等待人类导演在大屏上点击“放行”
    transitions:
      - condition: "always"
        next_node: "END"
